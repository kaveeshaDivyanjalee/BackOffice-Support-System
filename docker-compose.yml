version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backoffice_backend
    ports:
      - "8000:8000"
    environment:
      # Optional: Add any environment variables the backend needs
      - USE_TEST_MODE=false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: backoffice_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
